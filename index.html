<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contract RAG — Ask your documents</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#262d38; --text:#e6edf3;
    --muted:#8b949e; --accent:#2f81f7; --accent2:#1f6feb; --user:#1f6feb;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--text); height:100vh; display:flex; }
  /* sidebar */
  .sidebar { width:320px; background:var(--panel); border-right:1px solid var(--border);
             display:flex; flex-direction:column; padding:20px; }
  .brand { font-size:18px; font-weight:700; margin-bottom:4px; }
  .brand span { color:var(--accent); }
  .sub { color:var(--muted); font-size:12px; margin-bottom:20px; }
  .label { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:18px 0 8px; }
  .upload { border:1.5px dashed var(--border); border-radius:10px; padding:18px; text-align:center;
            cursor:pointer; color:var(--muted); font-size:13px; transition:.15s; }
  .upload:hover { border-color:var(--accent); color:var(--text); }
  .doc { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px;
         font-size:13px; color:var(--text); }
  .doc:hover { background:#1c2230; }
  .doclist { overflow-y:auto; flex:1; }
  select { width:100%; background:#0d1117; color:var(--text); border:1px solid var(--border);
           border-radius:8px; padding:9px; font-size:13px; }
  /* chat */
  .main { flex:1; display:flex; flex-direction:column; }
  .messages { flex:1; overflow-y:auto; padding:28px; display:flex; flex-direction:column; gap:18px; }
  .msg { max-width:760px; padding:14px 16px; border-radius:12px; line-height:1.5; font-size:14.5px; white-space:pre-wrap; }
  .msg.user { align-self:flex-end; background:var(--user); }
  .msg.bot  { align-self:flex-start; background:var(--panel); border:1px solid var(--border); }
  .cites { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
  .cite { font-size:11px; background:#0d1117; border:1px solid var(--border); color:var(--accent);
          padding:3px 8px; border-radius:20px; }
  .empty { color:var(--muted); text-align:center; margin:auto; max-width:420px; font-size:14px; line-height:1.6; }
  .empty h2 { color:var(--text); font-weight:600; }
  .ex { display:block; background:var(--panel); border:1px solid var(--border); border-radius:8px;
        padding:9px 12px; margin:8px 0; cursor:pointer; text-align:left; color:var(--text); font-size:13px; }
  .ex:hover { border-color:var(--accent); }
  /* composer */
  .composer { border-top:1px solid var(--border); padding:16px 28px; display:flex; gap:10px; }
  .composer input { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--text);
                    border-radius:10px; padding:13px 15px; font-size:14.5px; }
  .composer button { background:var(--accent2); color:#fff; border:none; border-radius:10px;
                     padding:0 22px; font-size:14px; font-weight:600; cursor:pointer; }
  .composer button:disabled { opacity:.5; cursor:default; }
  .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--muted);
         animation:b 1s infinite; margin:0 1px; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes b { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Contract<span>RAG</span></div>
    <div class="sub">Local-first contract Q&A · cited answers</div>

    <div class="label">Upload contract</div>
    <label class="upload" id="drop">
      <input type="file" id="file" accept=".pdf,.docx,.txt" hidden />
      ＋ Drop or click to add a PDF / DOCX / TXT
    </label>

    <div class="label">Search scope</div>
    <select id="scope"><option value="">All documents</option></select>

    <div class="label">Documents</div>
    <div class="doclist" id="docs"></div>
  </aside>

  <main class="main">
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        <h2>Ask your contracts anything</h2>
        Upload an agreement on the left, then try:
        <span class="ex">What is the termination clause in this agreement?</span>
        <span class="ex">Which contracts include a non-compete clause?</span>
        <span class="ex">What are the payment terms?</span>
      </div>
    </div>
    <div class="composer">
      <input id="q" placeholder="Ask a question about your contracts…" />
      <button id="send">Ask</button>
    </div>
  </main>

<script>
const $ = s => document.querySelector(s);
const msgs = $("#messages"), scope = $("#scope"), docsEl = $("#docs");

async function loadDocs(){
  const docs = await (await fetch("/documents")).json();
  scope.innerHTML = '<option value="">All documents</option>' +
    docs.map(d=>`<option value="${d.id}">${d.name}</option>`).join("");
  docsEl.innerHTML = docs.length
    ? docs.map(d=>`<div class="doc">📄 ${d.name}</div>`).join("")
    : '<div class="doc" style="color:var(--muted)">No documents yet</div>';
}

const fileInput = $("#file"), drop = $("#drop");
drop.addEventListener("click", ()=>fileInput.click());
fileInput.addEventListener("change", async () => {
  if(!fileInput.files.length) return;
  drop.textContent = "Uploading & indexing…";
  const fd = new FormData(); fd.append("file", fileInput.files[0]);
  const r = await fetch("/upload", {method:"POST", body:fd});
  drop.textContent = r.ok ? "✓ Added — add another?" : "Upload failed, try again";
  setTimeout(()=>drop.textContent="＋ Drop or click to add a PDF / DOCX / TXT", 2500);
  loadDocs();
});

function bubble(text, who){
  $("#empty")?.remove();
  const d = document.createElement("div");
  d.className = "msg "+who; d.textContent = text;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function ask(){
  const q = $("#q").value.trim(); if(!q) return;
  $("#q").value=""; $("#send").disabled=true;
  bubble(q, "user");
  const loading = bubble("", "bot");
  loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

  const fd = new FormData(); fd.append("question", q); fd.append("doc_id", scope.value);
  try{
    const res = await (await fetch("/chat", {method:"POST", body:fd})).json();
    loading.textContent = res.answer || res.detail || "No answer.";
    if(res.citations?.length){
      const c = document.createElement("div"); c.className="cites";
      c.innerHTML = res.citations.map(x=>`<span class="cite">${x.doc} ${x.page}</span>`).join("");
      loading.appendChild(c);
    }
  }catch(e){ loading.textContent = "Error contacting server."; }
  $("#send").disabled=false; msgs.scrollTop = msgs.scrollHeight;
}

$("#send").onclick = ask;
$("#q").addEventListener("keydown", e=>{ if(e.key==="Enter") ask(); });
document.addEventListener("click", e=>{ if(e.target.classList.contains("ex")){ $("#q").value=e.target.textContent; ask(); }});
loadDocs();
</script>
</body>
</html>
